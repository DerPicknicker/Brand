<!DOCTYPE html>
<html lang="de" id="app">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Studio — Social Media Creator</title>
<!-- Preconnect for faster font loading when online -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Google Fonts — loaded async, system fonts used as fallback when offline -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Caveat:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Caveat:wght@400;600;700&display=swap"></noscript>
<style>
/* System font stack — used as fallback if Google Fonts unavailable (offline) */
:root {
  --font-sans: 'Montserrat', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --font-display: 'Bebas Neue', 'Impact', 'Arial Black', sans-serif;
  --font-hand: 'Caveat', 'Segoe Script', cursive;
}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0e;--s1:#111113;--s2:#1a1a1e;--brd:#222;--t1:#f0f0f0;--t2:#777;--t3:#3a3a3a;--acc:#EBA83E}
body{font-family:var(--font-sans);background:var(--bg);color:var(--t1);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:12px;user-select:none}

/* ─ HEADER */
header{display:flex;align-items:center;gap:14px;padding:9px 16px;background:var(--s1);border-bottom:1px solid var(--brd);flex-shrink:0}
.logo{width:28px;height:28px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#000;border-radius:3px;flex-shrink:0}
.logo-txt{font-weight:900;font-size:11px;letter-spacing:.12em}
.logo-sub{font-size:7px;color:var(--t2);letter-spacing:.15em}
.h-tabs{display:flex;gap:2px;background:var(--bg);padding:3px;border-radius:5px;border:1px solid var(--brd);margin-left:auto}
.htab{padding:4px 12px;border:none;border-radius:3px;background:transparent;color:var(--t2);font-family:'Montserrat';font-size:9px;font-weight:700;cursor:pointer;transition:all .12s;letter-spacing:.06em;text-transform:uppercase}
.htab.on{background:var(--acc);color:#000}
.hbtns{display:flex;gap:5px}
.hb{padding:5px 10px;border:1px solid var(--brd);border-radius:4px;background:transparent;color:var(--t2);font-family:'Montserrat';font-size:9px;font-weight:700;cursor:pointer;transition:all .12s;letter-spacing:.04em;white-space:nowrap}
.hb:hover{border-color:var(--acc);color:var(--acc)}
.hb.pri{background:var(--acc);border-color:var(--acc);color:#000}
.hb.pri:hover{opacity:.85}

/* ─ MAIN */
main{display:flex;flex:1;overflow:hidden}

/* ─ LEFT */
.lp{width:210px;flex-shrink:0;border-right:1px solid var(--brd);background:var(--s1);display:flex;flex-direction:column;overflow:hidden}
.ls{flex:1;overflow-y:auto;padding:8px}
.slbl{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.2em;margin:8px 0 5px;padding:0 2px}
.slbl:first-child{margin-top:0}
.tg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:2px}
.tc{aspect-ratio:9/16;border-radius:5px;background:var(--s2);border:1.5px solid var(--brd);cursor:pointer;position:relative;overflow:hidden;transition:border-color .12s}
.tc:hover,.tc.on{border-color:var(--acc)}
.tc-vis{position:absolute;inset:0;padding:4px 4px 18px;display:flex;flex-direction:column}
.tc-n{font-size:5px;color:var(--t3);position:absolute;top:3px;right:4px}
.tc-lbl{font-size:7px;color:var(--t1);position:absolute;bottom:3px;left:4px;font-weight:700;line-height:1}
.tc-sub{font-size:5px;color:var(--t2);position:absolute;bottom:0px;left:4px}

/* color pack rows */
.cpl{display:flex;flex-direction:column;gap:3px}
.cpr{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:4px;border:1.5px solid var(--brd);cursor:pointer;transition:border-color .12s}
.cpr:hover,.cpr.on{border-color:var(--acc)}
.csw{display:flex;gap:2px}
.cd{width:9px;height:9px;border-radius:2px}
.cn{font-size:9px;font-weight:700;color:var(--t1);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cg-lbl{font-size:6px;color:var(--t3);letter-spacing:.15em;text-transform:uppercase;padding:4px 2px 2px;margin-top:4px}

/* ─ CANVAS */
.ca{flex:1;display:flex;align-items:center;justify-content:center;background:#060608;position:relative;overflow:hidden}
.cagrid{position:absolute;inset:0;background-image:linear-gradient(var(--brd) 1px,transparent 1px),linear-gradient(90deg,var(--brd) 1px,transparent 1px);background-size:28px 28px;opacity:.2}
.pf{width:252px;height:448px;border-radius:10px;overflow:hidden;box-shadow:0 18px 55px rgba(0,0,0,.75);position:relative;z-index:2;flex-shrink:0}
.pf canvas{width:100%;height:100%;display:block}
.sbadge{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--t3);white-space:nowrap;letter-spacing:.08em;z-index:2}

/* phone mockup */
.pmock{position:absolute;inset:-12px -7px;border:3px solid #252528;border-radius:28px;pointer-events:none;z-index:10}
.pnotch{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:52px;height:9px;background:#1a1a1e;border-radius:5px}
.phome{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:35px;height:3px;background:#252528;border-radius:2px}

/* ─ CAROUSEL STRIP */
.cstrip{display:none;border-top:1px solid var(--brd);background:var(--s1);padding:7px 12px;align-items:center;gap:5px;flex-shrink:0;overflow-x:auto}
.cslbl{font-size:7px;color:var(--t3);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap}
.cth{width:35px;height:62px;border-radius:3px;border:1.5px solid var(--brd);cursor:pointer;overflow:hidden;flex-shrink:0;transition:border-color .12s;position:relative}
.cth.on{border-color:var(--acc)}
.cth canvas{width:100%;height:100%;display:block}
.cthn{position:absolute;bottom:1px;right:2px;font-size:5px;color:rgba(255,255,255,.3)}
.cadd{width:35px;height:62px;border-radius:3px;border:1.5px dashed var(--brd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:18px;flex-shrink:0;transition:all .12s}
.cadd:hover{border-color:var(--acc);color:var(--acc)}
.cdel{width:35px;height:62px;border-radius:3px;border:1.5px dashed #3a1515;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#5a2525;font-size:12px;flex-shrink:0;transition:all .12s}
.cdel:hover{border-color:#c00;color:#c00}

/* ─ RIGHT */
.rp{width:265px;flex-shrink:0;border-left:1px solid var(--brd);background:var(--s1);display:flex;flex-direction:column;overflow:hidden}
.rs{flex:1;overflow-y:auto;padding:11px}
.rs>*+*{margin-top:10px}
.fl{font-size:7px;color:var(--t3);text-transform:uppercase;letter-spacing:.15em;margin-bottom:2px}
.fg{display:flex;flex-direction:column;gap:3px}
.fi,.fta{background:var(--s2);border:1px solid var(--brd);color:var(--t1);border-radius:4px;padding:6px 8px;font-family:'Montserrat';font-size:10px;width:100%;outline:none;transition:border-color .12s}
.fi:focus,.fta:focus{border-color:var(--acc)}
.fta{resize:none;height:52px;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:5px}

/* toggles */
.trow{display:flex;justify-content:space-between;align-items:center}
.tlbl{font-size:10px;color:var(--t2)}
.tog{width:28px;height:15px;border-radius:8px;background:var(--s2);border:1px solid var(--brd);cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.tog.on{background:var(--acc);border-color:var(--acc)}
.tog::after{content:'';position:absolute;width:11px;height:11px;border-radius:50%;background:var(--t2);top:1px;left:1px;transition:left .15s,background .15s}
.tog.on::after{left:14px;background:#000}

/* color btn row */
.cbr{display:flex;gap:3px}
.cb{flex:1;padding:4px 3px;border-radius:3px;border:1.5px solid var(--brd);cursor:pointer;font-size:7px;font-weight:700;text-align:center;transition:border-color .12s;font-family:'Montserrat'}
.cb.on{border-color:var(--acc)}

/* font btns */
.fbr{display:flex;flex-wrap:wrap;gap:3px}
.fb{padding:4px 7px;border-radius:3px;border:1.5px solid var(--brd);cursor:pointer;font-size:8px;text-align:center;background:var(--s2);color:var(--t2);transition:border-color .12s}
.fb.on{border-color:var(--acc);color:var(--t1)}

/* position grid */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.pb{aspect-ratio:1;border-radius:2px;background:var(--s2);border:1px solid var(--brd);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--t2);transition:all .12s}
.pb.on{background:var(--acc);border-color:var(--acc);color:#000}

/* upload */
.uz{border:1.5px dashed var(--brd);border-radius:6px;padding:10px;text-align:center;cursor:pointer;transition:border-color .12s;position:relative}
.uz:hover{border-color:var(--acc)}
.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uico{font-size:16px;margin-bottom:3px}
.utxt{font-size:8px;color:var(--t2);line-height:1.5}
.pthumb{width:100%;height:55px;object-fit:cover;border-radius:4px;margin-top:5px;display:none;border:1px solid var(--brd)}

/* slider */
.sl{-webkit-appearance:none;width:100%;height:3px;background:var(--s2);border-radius:2px;outline:none;cursor:pointer}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--acc);cursor:pointer}

@media (max-width: 640px) {
  .sl { height: 4px; }
  .sl::-webkit-slider-thumb { width: 20px; height: 20px; }
  .fi, .fta { font-size: 14px; padding: 9px 10px; }
  .fta { height: 72px; }
  .fl { font-size: 9px; }
  .tog { width: 36px; height: 20px; }
  .tog::after { width: 16px; height: 16px; }
  .tog.on::after { left: 18px; }
  .cb { padding: 8px 4px; font-size: 10px; }
  .fb { padding: 8px 10px; font-size: 11px; }
  .bbt { padding: 12px; font-size: 11px; }
  .cpr { padding: 9px 10px; }
  .cn { font-size: 11px; }
}

/* ─ MOBILE TAB BAR */
.mob-tabs{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(17,17,19,0.96);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--brd);z-index:100;
}
.mob-tab-inner{
  display:flex;
  height:56px;
  padding:0 8px;
  padding-bottom:env(safe-area-inset-bottom,0px);
  max-width:520px;
  margin:0 auto;
  width:100%;
}
.mtab{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:6px 0;
  cursor:pointer;border:none;background:transparent;
  color:var(--t2);
  font-family:var(--font-sans);font-size:9px;font-weight:600;
  letter-spacing:.03em;text-transform:uppercase;
  transition:color .15s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  border-radius:8px;
  margin:4px 2px;
}
.mtab:active{background:var(--s2);}
.mtab.on{color:var(--acc);}
.mtab.on::after{
  content:'';position:absolute;bottom:-4px;left:50%;
  transform:translateX(-50%);
  width:20px;height:2px;background:var(--acc);border-radius:1px;
}
.mtab-ico{font-size:19px;line-height:1;transition:transform .15s;}
.mtab.on .mtab-ico{transform:translateY(-1px);}
.mtab-lbl{font-size:8px;line-height:1;white-space:nowrap;}

/* ─ MOBILE SLIDE-UP PANEL */
.mob-panel{
  display:none;position:fixed;left:0;right:0;
  bottom:56px;
  background:var(--s1);
  border-top:1px solid var(--brd);
  border-radius:20px 20px 0 0;
  z-index:99;flex-direction:column;
  max-height:70vh;overflow:hidden;
  box-shadow:0 -12px 48px rgba(0,0,0,.6);
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
}
.mob-panel.open{display:flex;transform:translateY(0);}
.mob-panel-drag{
  width:44px;height:4px;background:#333;border-radius:2px;
  margin:12px auto 6px;flex-shrink:0;cursor:pointer;
}
.mob-panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 16px 10px;flex-shrink:0;
  border-bottom:1px solid var(--brd);
}
.mob-panel-title{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:.06em;}
.mob-panel-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--s2);border:1px solid var(--brd);
  color:var(--t2);font-size:13px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .12s;
}
.mob-panel-close:active{background:var(--brd);color:var(--t1);}
.mob-panel-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 32px;}

/* ─ RESPONSIVE BREAKPOINTS */

/* Tablet: hide right panel, show as sheet */
@media (max-width: 900px) {
  .rp { display: none; }
  .lp { width: 180px; }
  .pf { width: 200px; height: 355px; }
  .hb:not(.pri) { display: none; }
  .h-tabs { gap: 1px; }
  .htab { padding: 4px 8px; font-size: 8px; }
}

/* Mobile: full responsive layout */
@media (max-width: 640px) {
  body { overflow: hidden; }

  header {
    padding: 8px 12px;
    gap: 8px;
  }
  .logo { width: 24px; height: 24px; font-size: 11px; }
  .logo-txt { font-size: 10px; }
  .logo-sub { display: none; }
  .h-tabs { margin-left: auto; }
  .htab { padding: 4px 8px; font-size: 8px; }
  .hbtns { gap: 4px; }
  .hb { padding: 5px 8px; font-size: 9px; }
  /* hide save/load on mobile — too small */
  .hb:not(.pri):not(.mob-show) { display: none; }

  main {
    flex-direction: column;
    overflow: hidden;
    padding-bottom: 56px;
  }

  /* Left panel — hidden on mobile, shown as slide-up */
  .lp { display: none; }
  .rp { display: none; }

  /* Canvas takes full screen */
  .ca {
    flex: 1;
    width: 100%;
  }
  .pf {
    width: calc(100vw - 48px);
    max-width: 320px;
    height: auto;
    aspect-ratio: 9/16;
    max-height: calc(100vh - 200px);
  }
  /* Keep canvas at 1080×1920 resolution internally */
  .pf canvas { width: 100%; height: 100%; display: block; }

  .sbadge { display: none; }
  .cagrid { display: none; }

  /* Carousel strip on mobile */
  #cstrip { padding: 6px 10px; }
  .cth { width: 32px; height: 56px; }
  .cadd, .cdel { width: 32px; height: 56px; font-size: 16px; }

  /* Mobile tab bar visible */
  .mob-tabs { display: flex; }
  .mob-panel { display: none; }
  .mob-panel.open { display: flex; }
}

@media (max-width: 380px) {
  .pf {
    width: calc(100vw - 32px);
    max-height: calc(100vh - 180px);
  }
  .htab { padding: 3px 6px; font-size: 7px; }
}
.sv{font-size:8px;color:var(--t2)}

/* bottom */
.bb{padding:9px 11px;border-top:1px solid var(--brd);display:flex;flex-direction:column;gap:4px}
.br{display:flex;gap:4px}
.bbt{flex:1;padding:8px;background:var(--s2);border:1px solid var(--brd);color:var(--t1);font-family:'Montserrat';font-size:9px;font-weight:700;cursor:pointer;border-radius:4px;letter-spacing:.04em;transition:all .12s;text-transform:uppercase}
.bbt:hover{border-color:var(--acc)}
.bbt.acc{background:var(--acc);border-color:var(--acc);color:#000}
.bbt.acc:hover{opacity:.85}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
</style>
</head>
<body>

<header>
  <div class="logo">PS</div>
  <div>
    <div class="logo-txt">POST STUDIO</div>
    <div class="logo-sub" id="logo-sub-el">Social Media Creator · 9:16</div>
  </div>
  <div class="h-tabs">
    <button class="htab on" onclick="setMode('single',this)">Single</button>
    <button class="htab" onclick="setMode('carousel',this)">Carousel</button>
  </div>
  <div class="hbtns">
    <!-- Language toggle -->
    <div style="display:flex;gap:0;background:var(--bg);border:1px solid var(--brd);border-radius:4px;overflow:hidden">
      <button class="lang-btn htab on" data-lang="de" onclick="setLang('de')" style="padding:4px 8px;font-size:9px">DE</button>
      <button class="lang-btn htab" data-lang="en" onclick="setLang('en')" style="padding:4px 8px;font-size:9px">EN</button>
    </div>
    <button class="hb" onclick="toggleMock()">📱</button>
    <button class="hb" onclick="undo()">↩</button>
    <button class="hb" onclick="saveProject()">💾</button>
    <button class="hb" onclick="document.getElementById('projectLoad').click()">📂</button>
    <input type="file" id="projectLoad" accept=".json" style="display:none" onchange="loadProject(event)">
    <button class="hb pri" onclick="dlCur()">↓ Export</button>
  </div>
</header>

<main>
  <div class="lp"><div class="ls" id="ls"></div></div>

  <div class="ca">
    <div class="cagrid"></div>
    <div style="position:relative;z-index:2">
      <div class="pf" id="pf" style="position:relative">
        <canvas id="mc" width="1080" height="1920"></canvas>
        <!-- Drag overlay — only visible when photo loaded and crop mode on -->
        <div id="dragOverlay" style="position:absolute;inset:0;cursor:move;display:none;z-index:5"
          onmousedown="startDrag(event)" ontouchstart="startDrag(event)">
          <!-- crosshair -->
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:.4">
            <div style="width:30px;height:2px;background:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
            <div style="height:30px;width:2px;background:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
          </div>
          <div id="dragLabel" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:3px 8px;border-radius:3px;font-family:Montserrat;pointer-events:none;white-space:nowrap">Ziehen zum Verschieben · Scroll zum Zoomen</div>
        </div>
      </div>
      <div class="pmock" id="pmock" style="display:none"><div class="pnotch"></div><div class="phome"></div></div>
      <div class="sbadge">1080 × 1920 px</div>
    </div>
  </div>

  <div class="rp">
    <div class="rs" id="rs"></div>
    <div class="bb">
      <div class="br">
        <button class="bbt" onclick="copyImg()">Kopieren</button>
        <button class="bbt" onclick="savePreset()">💾 Preset</button>
      </div>
      <div class="br">
        <button class="bbt" id="dlAll" style="display:none" onclick="dlAllSlides()">↓ Alle</button>
        <button class="bbt acc" onclick="dlCur()">↓ Download PNG</button>
      </div>
    </div>
  </div>
</main>

<div id="cstrip" class="cstrip">
  <span class="cslbl">Slides</span>
  <div id="cthumbs" style="display:flex;gap:4px;align-items:center"></div>
  <div class="cadd" onclick="addSlide()">+</div>
  <div class="cdel" onclick="delSlide()">✕</div>
</div>

<!-- Mobile Tab Bar -->
<nav class="mob-tabs">
  <div class="mob-tab-inner">
    <button class="mtab on" id="mtab-preview" onclick="mobTab('preview')">
      <div class="mtab-ico">🖼</div>
      <div class="mtab-lbl" id="mtab-lbl-preview">Vorschau</div>
    </button>
    <button class="mtab" id="mtab-templates" onclick="mobTab('templates')">
      <div class="mtab-ico">◧</div>
      <div class="mtab-lbl" id="mtab-lbl-templates">Templates</div>
    </button>
    <button class="mtab" id="mtab-colors" onclick="mobTab('colors')">
      <div class="mtab-ico">🎨</div>
      <div class="mtab-lbl" id="mtab-lbl-colors">Farben</div>
    </button>
    <button class="mtab" id="mtab-edit" onclick="mobTab('edit')">
      <div class="mtab-ico">✏️</div>
      <div class="mtab-lbl" id="mtab-lbl-edit">Bearbeiten</div>
    </button>
    <button class="mtab" id="mtab-export" onclick="dlCur()">
      <div class="mtab-ico" style="color:var(--acc)">↓</div>
      <div class="mtab-lbl" id="mtab-lbl-export" style="color:var(--acc)">Export</div>
    </button>
  </div>
</nav>

<!-- Mobile Slide-up Panel: Templates -->

// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);
    this.closePath();return this;
  };
}

function defTexts(id){ const t=TPLS.find(x=>x.id===id); return t?{...t.def}:{}; }
function recCP(id){ const t=TPLS.find(x=>x.id===id); return t&&t.rec?t.rec:'fd-amber'; }

  mode:'single', tpl:'d-cover', cp:'fd-amber', font:'montserrat',

  cur:0, hist:[],

function c(){ return CP[S.cp]; }

// ══════════════════════════════════════════════════════════════════
// CANVAS HELPERS
// ══════════════════════════════════════════════════════════════════
function hexA(h,a){ const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }

// Sample luminance of a canvas region — returns 0 (dark) to 1 (bright)
function sampleLum(ctx,x,y,w,h){
  try{
    const d=ctx.getImageData(Math.max(0,x),Math.max(0,y),Math.min(w,1080),Math.min(h,1920)).data;
    let s=0;for(let i=0;i<d.length;i+=4)s+=d[i]*.299+d[i+1]*.587+d[i+2]*.114;
    return s/(d.length/4)/255;
  }catch(e){return 0.5;}
}

// Given a color hex and the background luminance, ensure readable contrast
// Returns the original color if contrast is fine, otherwise flips to dark/light
function contrastSafe(col, bgLum, threshold=0.4){
  // Parse col luminance crudely
  let r,g,b;
  if(col.startsWith('#')){r=parseInt(col.slice(1,3),16);g=parseInt(col.slice(3,5),16);b=parseInt(col.slice(5,7),16);}
  else return col; // can't parse rgba etc
  const fgLum=(r*.299+g*.587+b*.114)/255;
  const contrast=Math.abs(bgLum-fgLum);
  if(contrast>=threshold) return col;
  // Flip: if bg is bright use dark text, if bg is dark use light text
  return bgLum>0.5 ? '#111111' : '#F5F5F5';
}

function colFor(which){ const p=CP[S.cp]; return which==='accent'?p.acc:which==='muted'?p.mu:which==='faint'?p.fa:p.hl; }
function colForP(which,p){ return which==='accent'?p.acc:which==='muted'?p.mu:which==='faint'?p.fa:p.hl; }

function fitSz(ctx,txt,fam,wt,sz,maxW,min=40){
  while(sz>=min){ ctx.font=`${wt} ${sz}px ${fam}`; if(ctx.measureText(txt).width<=maxW)break; sz-=4; }
  return sz;
}
function wrapLines(ctx,txt,font,maxW){
  ctx.font=font; const words=txt.split(' '); const lines=[]; let cur='';
  words.forEach(w=>{ const t=cur?cur+' '+w:w; if(ctx.measureText(t).width>maxW){if(cur)lines.push(cur);cur=w;}else cur=t; });
  if(cur)lines.push(cur); return lines;
}

function drawHL(ctx,txt,x,y,fam,wt,sz,maxW,col,shadow,autoContrast){
  const s2=fitSz(ctx,txt,fam,wt,sz,maxW);
  ctx.font=`${wt} ${s2}px ${fam}`;
  let finalCol=col;
  if(autoContrast){
    const lum=sampleLum(ctx,x,y-s2,maxW,s2*1.2);
    finalCol=contrastSafe(col,lum);
  }
  if(shadow){ctx.shadowColor='rgba(0,0,0,0.75)';ctx.shadowBlur=20;ctx.shadowOffsetY=3;}
  ctx.fillStyle=finalCol; ctx.fillText(txt,x,y);
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  return s2;
}
function drawTxt(ctx,txt,x,y,font,col,shadow,autoContrast){
  ctx.font=font; let finalCol=col;
  if(autoContrast){
    const m=font.match(/(\d+)px/);const sz=m?parseInt(m[1]):30;
    const lum=sampleLum(ctx,x,y-sz,Math.min(800,ctx.measureText(txt).width+20),sz*1.4);
    finalCol=contrastSafe(col,lum);
  }
  if(shadow){ctx.shadowColor='rgba(0,0,0,0.65)';ctx.shadowBlur=12;ctx.shadowOffsetY=2;}
  ctx.fillStyle=finalCol;
  ctx.fillText(txt,x,y);
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
}

// ══════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════
function render(cv, st){
  const W=1080, H=1920, PAD=80;
  cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  const p=CP[st.cp];
  const f=FONTS[st.font||'montserrat'].fam;
  const t=st.texts||{};
  const sh=!!st.photo; // shadow when photo present
  const light=st.cp.startsWith('li-');

  // BG
  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H);

  // Photo — free position via photoX, photoY (offsets in 0..1 range), photoScale
  if(st.photo){
    const img=st.photo;
    // Base scale: cover the canvas
    const baseScale=Math.max(W/img.width,H/img.height);
    const scale=baseScale*(st.photoScale??1.0);
    const dw=img.width*scale, dh=img.height*scale;
    // photoX/photoY are pixel offsets on the 1080×1920 canvas (positive = shift right/down)
    const ox=st.photoX??0, oy=st.photoY??0;
    const cx=(W-dw)/2+ox, cy=(H-dh)/2+oy;
    ctx.drawImage(img,cx,cy,dw,dh);
    // Overlay gradient
    const op=Math.pow(st.op??0.55,0.75);
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,hexA(p.bg,Math.min(1,op*0.8)));
    g.addColorStop(0.3,hexA(p.bg,Math.min(1,op*0.35)));
    g.addColorStop(0.6,hexA(p.bg,Math.min(1,op*0.6)));
    g.addColorStop(1,hexA(p.bg,Math.min(1,op*1.05)));
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  // Grain (dark packs only, or if explicitly on)
  if(st.grain!==false && !light){
    ctx.save(); ctx.globalAlpha=0.035;
    for(let i=0;i<30000;i++){const x=Math.random()*W,y=Math.random()*H,v=Math.random()*255|0;ctx.fillStyle=`rgb(${v},${v},${v})`;ctx.fillRect(x,y,1.2,1.2);}
    ctx.restore();
  }

  // Helpers bound to this render — shadow + auto-contrast when photo present
  const hl=(txt,x,y,fam,wt,sz,maxW,col)=>drawHL(ctx,txt,x,y,fam,wt,sz,maxW,col,sh,sh);
  const tx=(txt,x,y,font,col)=>drawTxt(ctx,txt,x,y,font,col,sh,sh);

  // Top scrim — subtle gradient so brand label is always readable
  if(st.photo){
    const topG=ctx.createLinearGradient(0,0,0,160);
    topG.addColorStop(0,'rgba(0,0,0,0.55)');topG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=topG;ctx.fillRect(0,0,W,160);
  }

  // Slide number + brand label
  const tn=TPLS.find(x=>x.id===st.tpl);
  if(!light){
    const brandLum=sh?sampleLum(ctx,PAD,40,500,50):0;
    const brandCol=sh?contrastSafe(p.mu,brandLum):p.mu;
    ctx.font=`700 44px ${f}`; ctx.fillStyle=brandCol;
    ctx.fillText(tn?.n||'01',W-PAD-ctx.measureText(tn?.n||'01').width,80);
    ctx.font=`700 26px ${f}`; ctx.fillStyle=brandCol;
    ctx.fillText(t.brand||'FOUNDER. FOCUS. FUEL.',PAD,76);
    ctx.fillStyle=p.acc; ctx.fillRect(PAD,84,42,3);
  } else {
    const nn=tn?.n||'L1';
    ctx.beginPath();ctx.arc(PAD+22,60,22,0,Math.PI*2);ctx.fillStyle=p.hl;ctx.fill();
    ctx.font=`700 22px ${f}`; ctx.fillStyle=p.bg;
    ctx.fillText(nn,PAD+(nn.length>2?8:14),67);
    ctx.font=`500 24px ${f}`; ctx.fillStyle=p.mu;
    ctx.fillText(t.brand||'A DAY IN MY LIFE',PAD+60,65);
    ctx.fillStyle=p.acc; ctx.fillRect(PAD+60,73,50,2);
  }

  // ── DARK TEMPLATES
  switch(st.tpl){
    case 'd-cover':{
      let y=520;
      const l1=wrapLines(ctx,t.hl1||'DAS',`900 155px ${f}`,W-PAD*2);
      const l2=wrapLines(ctx,t.hl2||'EXPERIMENT.',`900 155px ${f}`,W-PAD*2);
      l1.forEach(l=>{const sz=hl(l,PAD,y,f,'900',155,W-PAD*2,colForP(st.h1c,p));y+=Math.round(sz*1.06)+4;});
      l2.forEach(l=>{const sz=hl(l,PAD,y,f,'900',155,W-PAD*2,colForP(st.h2c,p));y+=Math.round(sz*1.06)+4;});
      y+=30;
      (t.sub||'').split('\n').forEach(l=>{tx(l,PAD,y,`700 38px ${f}`,p.hl);y+=60;});
      y+=30;
      (t.bdy||'').split('\n').forEach(l=>{tx(l,PAD,y,`400 36px ${f}`,p.mu);y+=55;});
      if(t.cta){tx(t.cta,PAD,H-70,`700 32px ${f}`,p.mu);}
      break;
    }
    case 'd-statement':{
      ctx.font=`900 180px ${f}`;ctx.fillStyle=p.acc+'28';ctx.fillText('❝',PAD-12,490);
      let y=500;
      wrapLines(ctx,t.hl1||'ECHTER',`900 100px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'900',100,W-PAD*2,colForP(st.h1c,p));y+=Math.round(sz*1.1)+4;});
      wrapLines(ctx,t.hl2||'CONTENT.',`900 100px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'900',100,W-PAD*2,colForP(st.h2c,p));y+=Math.round(sz*1.1)+4;});
      ctx.fillStyle=p.acc;ctx.fillRect(PAD,y+16,58,3);y+=70;
      (t.sub||'').split('\n').forEach(l=>{tx(l,PAD,y,`500 34px ${f}`,p.hl);y+=58;});
      if(t.cta){tx(t.cta,PAD,H-70,`700 32px ${f}`,p.mu);}
      break;
    }
    case 'd-list':{
      let y=310;
      wrapLines(ctx,t.hl1||'MEINE',`900 120px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'900',120,W-PAD*2,colForP(st.h1c,p));y+=Math.round(sz*1.08)+4;});

      ctx.fillStyle=p.acc;ctx.fillRect(PAD,y+8,58,3);y+=64;
      (t.sub||'').split('\n').filter(Boolean).forEach((row,i)=>{
        const[nm,ds]=row.split('|');

        tx((i+1).toString(),PAD+17,iy+23,`700 22px ${f}`,p.acc);

      });

    }
    case 'd-day':{

      wrapLines(ctx,t.hl2||'MEIN TAG AUS.',`900 108px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'900',108,W-PAD*2,colForP(st.h2c,p));y+=Math.round(sz*1.08)+4;});
      ctx.fillStyle=p.acc;ctx.fillRect(PAD,y+8,58,3);y+=65;
      (t.sub||'').split('\n').filter(Boolean).forEach((sl,i)=>{
        const[ti,ac]=sl.split('|');const sy=y+i*130;
        ctx.fillStyle=p.acc+'66';ctx.fillRect(PAD+145,sy-14,2,i<7?130:28);
        ctx.beginPath();ctx.arc(PAD+146,sy,7,0,Math.PI*2);ctx.fillStyle=p.acc;ctx.fill();
        tx(ti||'',PAD,sy+7,`700 28px ${f}`,p.acc);
        tx(ac||'',PAD+170,sy+7,`700 36px ${f}`,p.hl);
      });
      if(t.cta){tx(t.cta,PAD,H-70,`700 32px ${f}`,p.mu);}
      break;
    }
    case 'd-quote':{
      ctx.font=`900 260px ${f}`;ctx.fillStyle=p.acc+'14';ctx.fillText('❝',PAD-18,880);
      let y=850;
      wrapLines(ctx,t.hl1||'DISCIPLINE TODAY',`900 95px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'900',95,W-PAD*2,colForP(st.h1c,p));y+=Math.round(sz*1.1)+4;});
      wrapLines(ctx,t.hl2||'FREEDOM TOMORROW.',`900 95px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'900',95,W-PAD*2,colForP(st.h2c,p));y+=Math.round(sz*1.1)+4;});
      ctx.fillStyle=p.acc;ctx.fillRect(PAD,y+18,75,4);y+=75;
      if(t.bdy){tx(t.bdy,PAD,y,`500 34px ${f}`,p.mu);}

    case 'd-progress':{

      wrapLines(ctx,t.hl1||'FORTSCHRITT.',`900 115px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'900',115,W-PAD*2,colForP(st.h1c,p));y+=Math.round(sz*1.08)+4;});
      wrapLines(ctx,t.hl2||'NICHT PERFEKTION.',`700 54px ${f}`,W-PAD*2).forEach(l=>{const sz=hl(l,PAD,y,f,'700',54,W-PAD*2,colForP(st.h2c,p));y+=Math.round(sz*1.1)+4;});
      ctx.fillStyle='#2a2a2a';ctx.fillRect(PAD,y+12,W-PAD*2,2);y+=55;

      const aw=parseInt(t.sub)||2;
      [1,2,3,4].forEach((w,i)=>{
        const bx=PAD+i*215,by=y,isA=w===aw;
        ctx.strokeStyle=isA?p.acc:'#333';ctx.lineWidth=isA?3:1.5;ctx.strokeRect(bx,by,155,95);

  // ── LIGHT TEMPLATES
  // Light family draw helpers
  function lHL(txt,x,y,sz,col,italic){
    const style=italic?'italic':'normal';
    const s2=fitSz(ctx,txt,f,`${style} 900`,sz,W-PAD*2);
    ctx.font=`${style} 900 ${s2}px ${f}`;
    let finalCol=col;
    if(sh){
      const lum=sampleLum(ctx,x,y-s2,W-PAD*2,s2*1.2);
      finalCol=contrastSafe(col,lum);
      ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=10;
    }
    ctx.fillStyle=finalCol; ctx.fillText(txt,x,y);
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
    return s2;
  }
  function lTx(txt,x,y,sz,col,wt){
    ctx.font=`${wt||400} ${sz}px ${f}`;
    let finalCol=col;
    if(sh){
      const lum=sampleLum(ctx,x,y-sz,Math.min(800,ctx.measureText(txt).width+20),sz*1.4);
      finalCol=contrastSafe(col,lum);
      ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;
    }
    ctx.fillStyle=finalCol; ctx.fillText(txt,x,y);
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
  }
  function lCheck(x,y,label,done){

    ctx.strokeStyle=done?p.acc:'#AAAAAA'; ctx.lineWidth=1.5;

    if(done){ctx.fillStyle=p.acc;ctx.fillRect(x+2,y-11,11,11);}
    lTx(label,x+24,y,26,p.hl);

      if(t.bdy){
        ctx.fillStyle=p.su;ctx.fillRect(PAD,cy+20,W-PAD*2,100);
        lTx(t.bdy,PAD+24,cy+80,30,p.mu);
        // Smiley
        ctx.font='70px serif';ctx.fillText('☺',W-180,cy+90);
      }
      break;
    }
    case 'l-this-that':{
      lHL(t.hl1||'THIS',PAD,400,130,p.hl);
      lHL(t.hl2||'OR THAT',PAD,540,130,p.hl);
      lAccLine(PAD,568,55);
      let y=650;
      ctx.fillStyle=p.fa;ctx.fillRect(PAD,y,W-PAD*2,1);y+=20;
      (t.sub||'').split('\n').filter(Boolean).forEach(row=>{
        const[left,right]=row.split('|');
        lTx(left||'',PAD,y+34,30,p.hl);
        lTx('oder',W/2-55,y+34,26,p.mu);
        lTx(right||'',W/2+50,y+34,30,p.mu);
        ctx.fillStyle=p.fa;ctx.fillRect(PAD,y+50,W-PAD*2,1);
        y+=68;
      });
      if(t.bdy){
        ctx.fillStyle=p.hl;ctx.fillRect(PAD,y+24,W-PAD*2,85);
        lTx(t.bdy,PAD+(W-PAD*2)/2-ctx.measureText(t.bdy).width/2,y+76,32,'#fff','700');
      }
      break;
    }
    case 'l-frage':{
      lHL(t.hl1||'FRAGE AN',PAD,400,110,p.hl);
      lHL(t.hl2||'EUCH',PAD,520,110,p.hl);
      lAccLine(PAD,548,55);
      // Chat bubble
      ctx.font='120px serif';ctx.fillStyle=p.mu+'33';ctx.fillText('💬',PAD+100,780);
      let y=860;
      (t.bdy||'').split('\n').forEach(l=>{lTx(l,PAD,y,34,l?p.mu:p.mu);y+=l?54:26;});
      if(t.cta){ctx.font=`900 90px ${f}`;ctx.fillStyle=p.mu+'55';ctx.fillText(t.cta,PAD+300,H-200);}
      break;
    }
    case 'l-experiment':{
      let y=380;
      lHL(t.hl1||'DAS',PAD,y,130,p.hl);y+=140;
      lHL(t.hl2||'EXPERIMENT',PAD,y,130,p.hl);y+=145;
      lAccLine(PAD,y+5,55);y+=55;
      (t.bdy||'4 Wochen.\n2 Videos pro Woche.\n1 Ziel: Reichweite testen.').split('\n').forEach(l=>{lTx(l,PAD,y,36,p.mu);y+=58;});
      // Handwritten accent
      ctx.font=`italic 700 100px 'Caveat',cursive`;ctx.fillStyle=p.acc;
      ctx.fillText(t.cta||"Los geht's!",PAD,H-150);
      break;
    }
  }

  // Bottom scrim + handle
  if(st.photo){
    const botG=ctx.createLinearGradient(0,H-120,0,H);
    botG.addColorStop(0,'rgba(0,0,0,0)');botG.addColorStop(1,'rgba(0,0,0,0.6)');
    ctx.fillStyle=botG;ctx.fillRect(0,H-120,W,120);
  }
  const handleLum=sh?sampleLum(ctx,PAD,H-50,400,40):0;
  const handleCol=sh?contrastSafe(p.fa,handleLum):p.fa;
  ctx.font=`500 24px ${f}`;ctx.fillStyle=handleCol;
  ctx.fillText(t.handle||'@yourhandle',PAD,H-30);
  if(light){
    ctx.font=`700 22px ${f}`;ctx.fillStyle=p.mu+'88';
    const bw2=ctx.measureText(t.brand||'FOUNDER. FOCUS. FUEL.').width;
    ctx.fillText(t.brand||'FOUNDER. FOCUS. FUEL.',W-PAD-bw2,H-30);
  }
}

function buildThumbs(){

      <canvas id="ct${i}" width="280" height="497"></canvas>
      <div class="cthn">${String(i+1).padStart(2,'0')}</div>
    </div>`).join('');
  S.slides.forEach((_,i)=>renderThumb(i));
}
function renderThumb(i){
  const cv=document.getElementById(`ct${i}`);if(!cv)return;
  render(cv,{...S.slides[i]});
}
function goSlide(i){
  saveSlide();S.cur=i;
  const sl=S.slides[i];
  S.tpl=sl.tpl;S.cp=sl.cp;S.font=sl.font||'montserrat';
  S.photo=sl.photo||null;S._thumbSrc=sl._thumbSrc||null;
  S.photoX=sl.photoX??0;S.photoY=sl.photoY??0;S.photoScale=sl.photoScale??1.0;
  S.screenPhoto=sl.screenPhoto||null;S.screenX=sl.screenX||0;S.screenY=sl.screenY||0;
  S.op=sl.op??0.55;
  S.grain=sl.grain!==false;S.h1c=sl.h1c||'white';S.h2c=sl.h2c||'accent';
  S.texts={...sl.texts};
  updateDragOverlay();
  buildLeft();buildRight();buildThumbs();raf();
}
function saveSlide(){
  S.slides[S.cur]={tpl:S.tpl,cp:S.cp,font:S.font,photo:S.photo,_thumbSrc:S._thumbSrc,
    photoX:S.photoX,photoY:S.photoY,photoScale:S.photoScale,
    screenPhoto:S.screenPhoto,screenX:S.screenX,screenY:S.screenY,
    op:S.op,grain:S.grain,h1c:S.h1c,h2c:S.h2c,texts:{...S.texts}};
}
function addSlide(){
  saveSlide();
  const nxt=TPLS[(S.slides.length)%TPLS.length];
  S.slides.push({tpl:nxt.id,cp:nxt.rec||S.cp,font:S.font,photo:null,photoX:0,photoY:0,photoScale:1.0,op:0.55,grain:true,h1c:'white',h2c:'accent',texts:defTexts(nxt.id)});
  S.cur=S.slides.length-1;
  S.tpl=nxt.id;S.cp=nxt.rec||S.cp;S.photo=null;S._thumbSrc=null;
  S.photoX=0;S.photoY=0;S.photoScale=1.0;
  S.h1c='white';S.h2c='accent';S.texts=defTexts(nxt.id);
  updateDragOverlay();
  buildLeft();buildRight();buildThumbs();raf();
}
function delSlide(){if(S.slides.length<=1)return;S.slides.splice(S.cur,1);S.cur=Math.max(0,S.cur-1);goSlide(S.cur);}

function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      S.photo=img;S._thumbSrc=ev.target.result;
      S.photoX=0;S.photoY=0;S.photoScale=1.0;
      updateDragOverlay();
      buildRight();raf();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function handleScreenPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{S.screenPhoto=img;S.screenX=0;S.screenY=0;buildRight();raf();};

  };

// ── DRAG & ZOOM on canvas preview ────────────────────────────────
// Preview is 252×448 px representing 1080×1920 canvas → scale factor:
const PREVIEW_SCALE = 252/1080; // = 0.2333

function updateDragOverlay(){
  const ov=document.getElementById('dragOverlay');
  if(ov) ov.style.display=S.photo?'block':'none';
}

function evPos(e){
  const pf=document.getElementById('pf').getBoundingClientRect();
  if(e.touches) return {x:e.touches[0].clientX-pf.left, y:e.touches[0].clientY-pf.top};
  return {x:e.clientX-pf.left, y:e.clientY-pf.top};
}

function startDrag(e){
  e.preventDefault();
  const pos=evPos(e);
  S._drag={startX:pos.x, startY:pos.y, origX:S.photoX, origY:S.photoY};
  const move=S._drag.touch?'touchmove':'mousemove';
  const up=S._drag.touch?'touchend':'mouseup';
  S._drag.touch=!!e.touches;
  const onMove=ev=>{
    ev.preventDefault();
    const p=evPos(ev);
    // Convert preview pixels → canvas pixels
    const dx=(p.x-S._drag.startX)/PREVIEW_SCALE;
    const dy=(p.y-S._drag.startY)/PREVIEW_SCALE;
    S.photoX=S._drag.origX+dx;
    S.photoY=S._drag.origY+dy;
    raf();
  };
  const onUp=()=>{
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onUp);
    S._drag=null;
  };
  document.addEventListener('mousemove',onMove,{passive:false});
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onUp);
}

// Scroll to zoom on the preview canvas
document.addEventListener('DOMContentLoaded',()=>{
  const pf=document.getElementById('pf');
  pf.addEventListener('wheel',e=>{
    if(!S.photo)return;
    e.preventDefault();
    const delta=e.deltaY>0?-0.05:0.05;
    S.photoScale=Math.max(0.5,Math.min(4.0,S.photoScale+delta));
    const sl=document.getElementById('scsl');
    const sv=document.getElementById('scv');
    if(sl)sl.value=S.photoScale;
    if(sv)sv.textContent=Math.round(S.photoScale*100)+'%';
    raf();
  },{passive:false});
});
function undo(){if(!S.hist.length)return;const prev=S.hist.pop();S.tpl=prev.tpl;S.texts={...prev.texts};S.h1c=prev.h1c;S.h2c=prev.h2c;S.cp=prev.cp||S.cp;buildLeft();buildRight();raf();}
function savePreset(){
  const d={tpl:S.tpl,cp:S.cp,font:S.font,h1c:S.h1c,h2c:S.h2c,texts:{...S.texts}};

// ══════════════════════════════════════════════════════════════════
// MOBILE TAB SYSTEM
// ══════════════════════════════════════════════════════════════════
let _mobActive = 'preview';

function mobTab(tab) {
  // Close all panels
  document.querySelectorAll('.mob-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.mtab').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('mtab-' + tab);
  if (btn) btn.classList.add('on');

  if (tab === 'preview') {
    _mobActive = 'preview';
    return;
  }
  if (tab === 'templates') {
    _mobActive = 'templates';
    buildMobTemplates();
    document.getElementById('mpanel-templates').classList.add('open');
  }
  if (tab === 'colors') {
    _mobActive = 'colors';
    buildMobColors();
    document.getElementById('mpanel-colors').classList.add('open');
  }
  if (tab === 'edit') {
    _mobActive = 'edit';
    buildMobEdit();
    document.getElementById('mpanel-edit').classList.add('open');
  }
}

function mobClose() {
  document.querySelectorAll('.mob-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.mtab').forEach(b => b.classList.remove('on'));
  document.getElementById('mtab-preview').classList.add('on');
  _mobActive = 'preview';
}

// After any state change, refresh open mobile panel
function refreshMobPanel() {
  if (_mobActive === 'templates') buildMobTemplates();
  if (_mobActive === 'colors') buildMobColors();
  if (_mobActive === 'edit') buildMobEdit();
}

      ${dark.map(t => `
        <div onclick="selTpl('${t.id}');mobClose()" style="aspect-ratio:9/16;border-radius:5px;background:var(--s2);border:1.5px solid ${S.tpl===t.id?'var(--acc)':'var(--brd)'};cursor:pointer;position:relative;overflow:hidden">
          <div style="position:absolute;bottom:3px;left:3px;font-size:6px;color:var(--t1);font-weight:700;line-height:1">${t.nm}</div>
        </div>`).join('')}

        </div>`).join('')}

          <div style="display:flex;gap:3px">${v.sw.map(s=>`<div style="width:14px;height:14px;border-radius:3px;background:${s};border:${s.startsWith('#F')||s==='#FFF'?'1px solid #333':'none'}"></div>`).join('')}</div>

function buildMobEdit() {
  const el = document.getElementById('mob-edit-content');
  if (!el) return;
  // Clone the desktop right panel content into the mobile edit panel
  el.innerHTML = document.getElementById('rs').innerHTML;
  // Touch-friendlier inputs — increase padding
  el.querySelectorAll('input,textarea').forEach(inp => {
    inp.style.padding = '10px 10px';
    inp.style.fontSize = '14px';
    inp.style.minHeight = inp.tagName === 'TEXTAREA' ? '70px' : 'auto';

}
// ══════════════════════════════════════════════════════════════════
function saveProject(){
  // Photos can't be serialized to JSON — we store thumbSrc as data URL
  const project={
    version:3,
    saved: new Date().toISOString(),
    mode:S.mode, tpl:S.tpl, cp:S.cp, font:S.font,
    photoX:S.photoX, photoY:S.photoY, photoScale:S.photoScale,
    op:S.op, grain:S.grain, h1c:S.h1c, h2c:S.h2c,
    texts:{...S.texts},
    thumbSrc: S._thumbSrc||null,  // background photo as data URL
    slides: S.slides.map(sl=>({
      tpl:sl.tpl, cp:sl.cp, font:sl.font,
      photoX:sl.photoX||0, photoY:sl.photoY||0, photoScale:sl.photoScale||1,
      op:sl.op, grain:sl.grain, h1c:sl.h1c, h2c:sl.h2c,
      texts:{...sl.texts},
      thumbSrc:sl._thumbSrc||null,
    })),
  };
  const blob=new Blob([JSON.stringify(project,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.download=`post-studio-${Date.now()}.json`;
  a.href=URL.createObjectURL(blob); a.click();
}

function loadProject(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const proj=JSON.parse(ev.target.result);
      if(!proj.version) throw new Error('Invalid project file');
      S.tpl=proj.tpl||'d-cover';
      S.cp=proj.cp||'fd-amber';
      S.font=proj.font||'montserrat';
      S.photoX=proj.photoX||0; S.photoY=proj.photoY||0; S.photoScale=proj.photoScale||1;
      S.op=proj.op??0.55; S.grain=proj.grain!==false;
      S.h1c=proj.h1c||'white'; S.h2c=proj.h2c||'accent';
      S.texts={...proj.texts};
      S.photo=null; S._thumbSrc=null;
      // Restore photos from data URLs
      const restorePhoto=(src,cb)=>{
        if(!src){cb(null);return;}
        const img=new Image(); img.onload=()=>cb(img); img.src=src;
      };
      restorePhoto(proj.thumbSrc,(img)=>{
        S.photo=img; S._thumbSrc=proj.thumbSrc;
        // Restore slides
        if(proj.slides&&proj.slides.length){
          S.slides=proj.slides.map(sl=>({...sl,photo:null,screenPhoto:null}));
          S.cur=0;
          // Restore slide photos async
          proj.slides.forEach((sl,i)=>{
            restorePhoto(sl.thumbSrc,(img)=>{ S.slides[i].photo=img; S.slides[i]._thumbSrc=sl.thumbSrc; if(i===S.cur)S.photo=img; renderThumb(i); });
          });
        }
        updateDragOverlay(); buildLeft(); buildRight();
        if(S.mode==='carousel') buildThumbs();
        raf();
      });
      showToast(t('toastLoaded'));
    }catch(err){ showToast(t('toastError')); }
  };
  reader.readAsText(file);
  e.target.value=''; // reset so same file can be loaded again
}

// ── Toast notification ────────────────────────────────────────────
function showToast(msg, duration=2000){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';
    Object.assign(t.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',
      background:'#1a1a1e',border:'1px solid #444',color:'#f0f0f0',padding:'8px 18px',
      borderRadius:'6px',fontSize:'11px',fontFamily:'Montserrat',fontWeight:'700',
      zIndex:'9999',transition:'opacity .3s',pointerEvents:'none'});
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._to); t._to=setTimeout(()=>t.style.opacity='0',duration);
}

// ── Mobile panel swipe-to-close ────────────────────────────────
document.querySelectorAll('.mob-panel').forEach(panel => {
  let startY = 0;
  panel.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive:true});
  panel.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 80) mobClose();
  }, {passive:true});
});

// ── Resize handler: recalc canvas preview scale ────────────────
function handleResize() {
  const pf = document.getElementById('pf');
  if (!pf) return;
  // Force repaint on mobile when orientation changes
  raf();
}
window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', () => setTimeout(handleResize, 150));
